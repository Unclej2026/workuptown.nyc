<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Work Uptown — Community coworking series in Washington Heights, NYC." />
    <title>Work Uptown · Washington Heights</title>

    <!-- PWA Meta Tags -->
    <meta name="application-name" content="Work Uptown"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="WU Admin"/>
    <meta name="theme-color" content="#C8553D"/>
    <meta name="mobile-web-app-capable" content="yes"/>

    <!-- PWA Icons -->
    <link rel="manifest" href="/manifest.json"/>
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png"/>
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png"/>
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png"/>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #F7F6F3; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('SW registered'))
            .catch(err => console.log('SW failed:', err));
        });
      }
    </script>
  </body>
</html>
